- project:
    name: ai-review-agent-gemini
    repo: ai-review-agent-gemini
    organization: GerritForge
    extra-plugins: 'secure-config'
    extra-gh-repos: 'ai-review-agent-provider'
    jobs:
      - 'plugin-{name}-gh-bazel-{branch}':
          branch:
            - master
            - stable-3.14
      - 'plugin-{name}-verifier-gh'
