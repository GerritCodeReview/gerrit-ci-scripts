- project:
    name: cached-refdb
    repo: cached-refdb
    organization: GerritForge
    jobs:
      - 'module-{name}-gh-bazel-{branch}':
          extra-gh-repos: 'gerrit-bsl-license'
          branch:
            - master
            - stable-3.13
            - stable-3.14
      - 'module-{name}-verifier'
      - 'module-{name}-verifier-gh'
