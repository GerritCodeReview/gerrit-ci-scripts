- project:
    name: virtualhost
    repo: virtualhost
    organization: GerritForge
    jobs:
      - 'module-{name}-bazel-{branch}':
          branch:
            - stable-3.12
            - stable-3.11
      - 'module-{name}-gh-bazel-{branch}':
          branch:
            - master
            - stable-3.13
      - 'plugin-{name}-gh-bazel-{branch}-{gerrit-branch}':
          branch:
            - master
          gerrit-branch:
            - stable-3.14
