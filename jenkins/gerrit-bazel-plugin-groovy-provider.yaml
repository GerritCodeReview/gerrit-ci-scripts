- project:
    name: groovy-provider
    repo: groovy-provider
    organization: GerritForge
    jobs:
      - 'plugin-{name}-verifier-gh'
      - 'plugin-scripting-{name}-gh-bazel-{branch}':
          extra-gh-repos: 'gerrit-bsl-license'
          branch:
            - master
            - stable-3.13
      - 'plugin-scripting-{name}-gh-bazel-{branch}-{gerrit-branch}':
          extra-gh-repos: 'gerrit-bsl-license'
          branch:
            - master
          gerrit-branch:
            - stable-3.14
      - 'plugin-scripting-{name}-bazel-{branch}-{gerrit-branch}':
          branch:
            - master
          gerrit-branch:
            - stable-3.12
